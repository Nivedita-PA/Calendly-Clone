<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Calendly Clone</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .logo a {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0069ff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.35rem; text-align: center; }
        .subtitle { font-size: 0.9rem; color: #6b7280; text-align: center; margin-bottom: 1.75rem; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #111827;
            background: #fff;
            transition: border-color 0.15s;
            margin-bottom: 1rem;
        }
        input:focus { outline: none; border-color: #0069ff; box-shadow: 0 0 0 3px rgba(0,105,255,0.12); }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #0069ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: #0057d8; }
        .footer-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
            color: #6b7280;
        }
        .footer-link a { color: #0069ff; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><a href="/">Calendly Clone</a></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your bookings</p>

    <div th:if="${loginError}" class="alert alert-error" th:text="${loginError}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${loggedOut}" class="alert alert-success">You have been signed out.</div>

    <form th:action="@{/login}" method="post">
        <label for="username">Email</label>
        <input type="email" id="username" name="username" placeholder="you@example.com" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <p class="footer-link">
        Don't have an account? <a href="/register">Create one free</a>
    </p>
</div>
</body>
</html>
