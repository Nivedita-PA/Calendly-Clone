<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Calendly Clone</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
        }
        .logo { text-align: center; margin-bottom: 1.75rem; }
        .logo a {
            font-size: 1.5rem; font-weight: 700; color: #0069ff;
            text-decoration: none; letter-spacing: -0.5px;
        }
        h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.35rem; text-align: center; }
        .subtitle { font-size: 0.9rem; color: #6b7280; text-align: center; margin-bottom: 1.75rem; }
        .alert {
            padding: 0.75rem 1rem; border-radius: 8px;
            font-size: 0.875rem; margin-bottom: 1rem;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .invite-badge {
            background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
            padding: 0.6rem 1rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1.25rem; text-align: center;
        }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #111827;
            background: #fff;
            transition: border-color 0.15s;
        }
        input:focus { outline: none; border-color: #0069ff; box-shadow: 0 0 0 3px rgba(0,105,255,0.12); }
        .field-error {
            color: #dc2626; font-size: 0.8rem; margin-top: 0.3rem;
        }
        input.is-invalid { border-color: #dc2626; }
        .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.3rem; }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #0069ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: #0057d8; }
        .footer-link { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #6b7280; }
        .footer-link a { color: #0069ff; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
        .terms { font-size: 0.78rem; color: #9ca3af; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><a href="/">Calendly Clone</a></div>
    <h1>Create your account</h1>
    <p class="subtitle">Start scheduling in minutes — it's free</p>

    <!-- Invite badge -->
    <div th:if="${inviteToken}" class="invite-badge">
        You were invited to join a team. Create an account to accept.
    </div>

    <!-- Global error -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${form}" method="post" novalidate>
        <input type="hidden" th:if="${inviteToken}" name="token" th:value="${inviteToken}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   placeholder="your-name" autocomplete="username">
            <div class="field-error" th:if="${#fields.hasErrors('username')}"
                 th:errors="*{username}"></div>
            <div class="hint">Used in your booking URL: /book/your-name/...</div>
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="you@example.com" autocomplete="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="At least 8 characters" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
        </div>

        <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                   placeholder="••••••••" autocomplete="new-password">
            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                 th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="terms">By signing up you agree to our Terms of Service.</p>

    <p class="footer-link">
        Already have an account? <a href="/login">Sign in</a>
    </p>
</div>
</body>
</html>
