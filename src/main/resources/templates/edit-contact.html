<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f8f8f7;
            color:#1a1a1a;
        }

        /* Navbar */
        .navbar{
            height:65px;
            background:white;
            border-bottom:1px solid #e5e5e5;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 24px;
        }

        .logo{
            font-size:18px;
            font-weight:700;
            color:#0b5cff;
        }

        .page-text{
            font-size:14px;
            color:#777;
        }

        /* Main */
        .container{
            max-width:650px;
            margin:60px auto;
            padding:0 20px;
        }

        /* Form Card */
        .form-card{
            background:white;
            border:1px solid #e5e5e5;
            border-radius:18px;
            padding:32px;
            box-shadow:0 8px 18px rgba(0,0,0,0.04);
        }

        .form-title{
            font-size:28px;
            font-weight:700;
            margin-bottom:8px;
        }

        .form-subtitle{
            color:#666;
            font-size:14px;
            margin-bottom:28px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:600;
            color:#374151;
        }

        input{
            width:100%;
            padding:13px 14px;
            border:1px solid #d1d5db;
            border-radius:10px;
            font-size:15px;
            transition:0.2s;
        }

        input:focus{
            outline:none;
            border-color:#0b5cff;
            box-shadow:0 0 0 3px rgba(11,92,255,0.10);
        }

        /* Buttons */
        .actions{
            display:flex;
            justify-content:flex-end;
            gap:12px;
            margin-top:28px;
        }

        .btn{
            padding:11px 18px;
            border:none;
            border-radius:10px;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            text-decoration:none;
        }

        .btn-cancel{
            background:#f3f4f6;
            color:#374151;
        }

        .btn-cancel:hover{
            background:#e5e7eb;
        }

        .btn-save{
            background:#0b5cff;
            color:white;
        }

        .btn-save:hover{
            background:#0048d9;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Calendly Clone</div>
    <div class="page-text">Edit Contact</div>
</div>

<div class="container">

    <div class="form-card">

        <div class="form-title">Edit Contact</div>
        <div class="form-subtitle">
            Update the contact details below.
        </div>

        <form th:action="@{'/contacts/' + ${contact.id} + '/edit'}"
              th:object="${contact}"
              method="post">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name"
                       type="text"
                       th:field="*{name}"
                       placeholder="Enter full name"
                       required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email"
                       type="email"
                       th:field="*{email}"
                       placeholder="Enter email"
                       required>
            </div>

            <div class="actions">
                <a href="/contacts" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">
                    Save Changes
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
