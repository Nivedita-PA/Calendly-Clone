<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
               background: #f4f4f1; margin: 0; padding: 2rem 1rem; color: #1a1a1a; }
        .wrap { max-width: 560px; margin: 0 auto; background: #fff;
                border-radius: 16px; overflow: hidden; border: 1px solid #e2e0dc; }
        .header { background: #0a0f1e; padding: 24px 40px; text-align: center; }
        .logo   { font-size: 20px; font-weight: 700; color: #fff; }
        .logo span { color: #4f7dff; }
        .bar { background: #fff3cd; padding: 12px 40px; text-align: center;
               font-size: 13px; font-weight: 600; color: #856404;
               border-bottom: 1px solid #ffe08a; }
        .body { padding: 36px 40px 28px; }
        .title { font-size: 20px; font-weight: 700; color: #0d0f12; margin-bottom: 8px; }
        .sub   { font-size: 14px; color: #3c4049; margin-bottom: 24px; }
        .info-box { background: #f4f4f1; border-radius: 10px; padding: 18px 22px; margin-bottom: 24px; }
        .row { display: flex; gap: 12px; padding: 9px 0;
               border-bottom: 1px solid #e2e0dc; font-size: 13px; }
        .row:last-child { border-bottom: none; }
        .lbl { color: #7a808c; font-weight: 600; min-width: 100px; }
        .val { color: #0d0f12; }
        .btn-wrap { text-align: center; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 28px; background: #2c5fff;
               color: #fff !important; border-radius: 999px; font-size: 13px;
               font-weight: 600; text-decoration: none; }
        .footer { background: #f4f4f1; border-top: 1px solid #e2e0dc;
                  padding: 20px 40px; text-align: center; font-size: 11px; color: #888780; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header"><div class="logo">Calendly<span>.</span></div></div>
    <div class="bar">&#9998; Booking updated by guest</div>
    <div class="body">
        <h1 class="title">A booking was updated</h1>
        <p class="sub">
            <strong th:text="${guestName}">Guest</strong>
            (<span th:text="${guestEmail}">email</span>) has changed their booking.
        </p>
        <div class="info-box">
            <div class="row">
                <span class="lbl">Meeting</span>
                <span class="val" th:text="${booking.eventType.title}">Call</span>
            </div>
            <div class="row">
                <span class="lbl">Date</span>
                <span class="val"
                      th:text="${#temporals.format(booking.startTime, 'EEEE, MMMM d, yyyy')}">
                    Monday, Jan 1, 2025
                </span>
            </div>
            <div class="row">
                <span class="lbl">Time</span>
                <span class="val"
                      th:text="${#temporals.format(booking.startTime, 'h:mm a')}
                              + ' – '
                              + ${#temporals.format(booking.endTime, 'h:mm a')}">
                    10:00 AM – 10:30 AM
                </span>
            </div>
            <div class="row" th:if="${booking.guestNotes != null and !booking.guestNotes.isEmpty()}">
                <span class="lbl">Notes</span>
                <span class="val" th:text="${booking.guestNotes}">Notes</span>
            </div>
        </div>
        <!-- Meeting link -->
        <div th:if="${booking.eventType.meetingLink != null and !booking.eventType.meetingLink.isEmpty()}"
             style="background:#f0f4ff;border:1px solid #c7d7ff;border-radius:8px;
                    padding:12px 18px;margin-bottom:18px;text-align:center;">
            <div style="font-size:11px;font-weight:700;color:#3b5bdb;
                        text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">
                Meeting link
            </div>
            <a th:href="${booking.eventType.meetingLink}"
               th:text="${booking.eventType.meetingLink}"
               style="color:#2c5fff;font-weight:600;font-size:13px;word-break:break-all;">
                https://meet.google.com/...
            </a>
        </div>

        <div class="btn-wrap">
            <a th:href="${baseUrl + '/dashboard'}" class="btn">View dashboard</a>
        </div>
    </div>
    <div class="footer">Calendly — scheduling made simple</div>
</div>
</body>
</html>
