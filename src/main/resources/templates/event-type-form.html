<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editing} ? 'Edit Event Type' : 'New Event Type'">Event Type</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            color: #111827;
            min-height: 100vh;
        }
        nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 60px;
            gap: 1rem;
        }
        .nav-brand { font-size: 1.1rem; font-weight: 700; color: #0069ff; text-decoration: none; }
        .nav-sep { color: #d1d5db; }
        .nav-current { font-size: 0.95rem; color: #374151; }
        .container {
            max-width: 680px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .subtitle { font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem; }
        .field { margin-bottom: 1.25rem; }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }
        .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.3rem; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #111827;
            background: #fff;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0069ff;
            box-shadow: 0 0 0 3px rgba(0,105,255,0.12);
        }
        textarea { resize: vertical; min-height: 80px; }
        .field-error { color: #dc2626; font-size: 0.8rem; margin-top: 0.3rem; }
        input.is-invalid, textarea.is-invalid, select.is-invalid { border-color: #dc2626; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .color-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        input[type="color"] {
            width: 44px;
            height: 38px;
            padding: 2px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
        }
        .color-hex {
            flex: 1;
        }
        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 1.5rem 0;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }
        .btn-primary {
            padding: 0.65rem 1.5rem;
            background: #0069ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: #0057d8; }
        .btn-cancel {
            padding: 0.65rem 1.25rem;
            background: #fff;
            color: #374151;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-cancel:hover { background: #f3f4f6; }
        @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/dashboard">Dashboard</a>
    <span class="nav-sep">/</span>
    <span class="nav-current" th:text="${editing} ? 'Edit Event Type' : 'New Event Type'">Event Type</span>
</nav>

<div class="container">
    <div class="card">
        <h1 th:text="${editing} ? 'Edit Event Type' : 'Create Event Type'">Event Type</h1>
        <p class="subtitle">
            <span th:if="${editing}">Update this meeting template.</span>
            <span th:unless="${editing}">Define a meeting template guests can book.</span>
        </p>

        <form th:action="${editing} ? @{'/event-types/' + ${eventTypeId} + '/edit'} : @{/event-types/new}"
              th:object="${form}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Title -->
            <div class="field">
                <label for="title">Title *</label>
                <input type="text" id="title" th:field="*{title}"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       placeholder="e.g. 30-min intro call">
                <div class="field-error" th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}"></div>
            </div>

            <!-- Description -->
            <div class="field">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}"
                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                          placeholder="What is this meeting about?"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('description')}"
                     th:errors="*{description}"></div>
            </div>

            <!-- Duration + Meeting Type -->
            <div class="two-col">
                <div class="field">
                    <label for="durationMinutes">Duration (minutes) *</label>
                    <input type="number" id="durationMinutes" th:field="*{durationMinutes}"
                           th:classappend="${#fields.hasErrors('durationMinutes')} ? 'is-invalid'"
                           min="5" step="5">
                    <div class="field-error" th:if="${#fields.hasErrors('durationMinutes')}"
                         th:errors="*{durationMinutes}"></div>
                </div>
                <div class="field">
                    <label for="meetingType">Meeting Type *</label>
                    <select id="meetingType" th:field="*{meetingType}">
                        <option th:each="t : ${meetingTypes}"
                                th:value="${t.name()}"
                                th:text="${t.name().replace('_', ' ')}">ONE ON ONE</option>
                    </select>
                    <div class="field-error" th:if="${#fields.hasErrors('meetingType')}"
                         th:errors="*{meetingType}"></div>
                </div>
            </div>

            <hr class="divider">

            <!-- Buffer times -->
            <div class="two-col">
                <div class="field">
                    <label for="bufferBefore">Buffer Before (minutes)</label>
                    <input type="number" id="bufferBefore" th:field="*{bufferBefore}" min="0" step="5">
                    <div class="hint">Padding before the meeting starts</div>
                    <div class="field-error" th:if="${#fields.hasErrors('bufferBefore')}"
                         th:errors="*{bufferBefore}"></div>
                </div>
                <div class="field">
                    <label for="bufferAfter">Buffer After (minutes)</label>
                    <input type="number" id="bufferAfter" th:field="*{bufferAfter}" min="0" step="5">
                    <div class="hint">Recovery time after the meeting</div>
                    <div class="field-error" th:if="${#fields.hasErrors('bufferAfter')}"
                         th:errors="*{bufferAfter}"></div>
                </div>
            </div>

            <!-- Meeting link -->
            <div class="field">
                <label for="meetingLink">Video Meeting Link</label>
                <input type="text" id="meetingLink" th:field="*{meetingLink}"
                       placeholder="https://zoom.us/j/... or https://meet.google.com/...">
                <div class="hint">Zoom, Google Meet, or Teams link — included in confirmation emails</div>
            </div>

            <!-- Color -->
            <div class="field">
                <label>Color</label>
                <div class="color-row">
                    <input type="color" id="colorPicker" th:value="${form.color}"
                           oninput="document.getElementById('color').value=this.value">
                    <input type="text" id="color" th:field="*{color}" class="color-hex"
                           placeholder="#0069ff" maxlength="7"
                           oninput="document.getElementById('colorPicker').value=this.value">
                </div>
                <div class="hint">Shown as an accent on your booking page</div>
            </div>

            <hr class="divider">

            <div class="actions">
                <a href="/dashboard" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-primary"
                        th:text="${editing} ? 'Save changes' : 'Create event type'">
                    Create event type
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
