<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Error — Calendly Clone</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; color: #ef4444; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.75rem; }
        .message {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-detail {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.7rem 1.75rem;
            background: #0069ff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.15s;
        }
        .btn:hover { background: #0057d8; }
        .secondary-link { margin-top: 1rem; font-size: 0.875rem; color: #6b7280; }
        .secondary-link a { color: #0069ff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">&#9888;</div>
    <h1>Invite Link Problem</h1>
    <p class="message">
        This invite link is invalid, has already been used, or has expired.
        Please ask the team admin to send you a new invite.
    </p>

    <div th:if="${error}" class="error-detail" th:text="${error}"></div>

    <a href="/" class="btn">Go to Homepage</a>

    <p class="secondary-link">
        Have an account? <a href="/login">Sign in</a>
    </p>
</div>
</body>
</html>
